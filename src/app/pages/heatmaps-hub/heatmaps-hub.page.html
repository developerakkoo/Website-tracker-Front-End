<ion-content [fullscreen]="true">
  <div class="wt-page-padding">
    <app-card title="Heatmaps by project" subtitle="Click, scroll, and attention overlays.">
      <p class="wt-text-muted">
        Heatmaps are opened from each project’s detail page so we know which site and API key to use.
      </p>
      <ion-button expand="block" routerLink="/projects" class="wt-btn-follow">
        <ion-icon slot="start" name="folder-outline"></ion-icon>
        Choose project
      </ion-button>
    </app-card>
  </div>
</ion-content>
