<ion-content [fullscreen]="true" class="auth-page">
  <div class="auth-layout">
    <div class="auth-brand">
      <h1 class="auth-brand__title">Website Tracker</h1>
      <p class="auth-brand__tagline">Create your workspace and start capturing sessions in minutes.</p>
    </div>
    <div class="auth-card-wrap">
      <ion-card class="auth-card">
        <ion-card-header>
          <ion-card-title>Register</ion-card-title>
          <ion-card-subtitle>New account</ion-card-subtitle>
        </ion-card-header>
        <ion-card-content>
          <form [formGroup]="_form" (ngSubmit)="onSubmit()">
            <ion-item lines="full" class="auth-field">
              <ion-label position="stacked">Email <ion-text color="danger">*</ion-text></ion-label>
              <ion-input formControlName="email" type="email" autocomplete="email" inputmode="email"></ion-input>
            </ion-item>
            <ion-item lines="full" class="auth-field">
              <ion-label position="stacked">Password <ion-text color="danger">*</ion-text></ion-label>
              <ion-input formControlName="password" type="password" autocomplete="new-password"></ion-input>
            </ion-item>
            <ion-button expand="block" type="submit" [disabled]="_form.invalid" class="wt-btn-follow">
              Create account
            </ion-button>
            <p class="auth-switch">
              <a routerLink="/">Already have an account? Sign in</a>
            </p>
          </form>
        </ion-card-content>
      </ion-card>
    </div>
  </div>
</ion-content>
