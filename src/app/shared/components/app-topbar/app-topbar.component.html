<header class="topbar wt-shell-header" role="banner">
  <div class="topbar__row wt-shell-header__row">
    <ion-button
      class="topbar__menu-btn wt-header-icon-btn"
      fill="clear"
      aria-label="Open menu"
      (click)="openMenu()">
      <ion-icon slot="icon-only" name="menu-outline"></ion-icon>
    </ion-button>

    <div class="topbar__title-wrap">
      <h1 class="topbar__title wt-shell-header__title">{{ pageTitle() }}</h1>
    </div>

    <div class="topbar__desktop">
      <ion-button
        fill="clear"
        class="wt-header-icon-btn topbar__date-btn"
        id="topbar-date-btn"
        aria-label="Date range (coming soon)">
        <ion-icon slot="start" name="calendar-outline"></ion-icon>
        <span class="topbar__btn-label">Last 7 days</span>
      </ion-button>

      <ion-searchbar
        class="topbar__search"
        placeholder="Search…"
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearchSubmit()"
        [showClearButton]="'focus'"
        aria-label="Global search">
      </ion-searchbar>

      <ion-button *ngIf="showNewProjectBtn" fill="solid" color="primary" size="small" (click)="goToNewProject()">
        <ion-icon slot="start" name="add-circle-outline"></ion-icon>
        <span class="topbar__btn-label">New project</span>
      </ion-button>

      <ion-button fill="clear" class="wt-header-icon-btn" aria-label="Notifications">
        <ion-icon slot="icon-only" name="notifications-outline"></ion-icon>
      </ion-button>

      <ion-button fill="clear" class="wt-header-icon-btn" aria-label="Account" (click)="accountPopoverOpen = true">
        <ion-icon slot="icon-only" name="person-circle-outline"></ion-icon>
      </ion-button>

      <div class="wt-header-chip topbar__project-chip" *ngIf="projects.length > 0">
        <ion-select
          interface="popover"
          [placeholder]="selectedProjectId ? 'Project' : 'Select project'"
          [value]="selectedProjectId"
          (ionChange)="onProjectChange($any($event).detail.value)"
          aria-label="Select project">
          <ion-select-option *ngFor="let p of projects" [value]="p.id">{{ p.name }}</ion-select-option>
        </ion-select>
      </div>
    </div>

    <div class="topbar__mobile-actions">
      <div class="wt-header-chip topbar__project-chip topbar__project-chip--compact" *ngIf="projects.length > 0">
        <ion-select
          interface="action-sheet"
          [placeholder]="'Project'"
          [value]="selectedProjectId"
          (ionChange)="onProjectChange($any($event).detail.value)"
          aria-label="Select project">
          <ion-select-option *ngFor="let p of projects" [value]="p.id">{{ p.name }}</ion-select-option>
        </ion-select>
      </div>
      <ion-button *ngIf="showNewProjectBtn" fill="clear" class="wt-header-icon-btn" (click)="goToNewProject()" aria-label="New project">
        <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" class="wt-header-icon-btn" (click)="searchOpen = !searchOpen" aria-label="Toggle search">
        <ion-icon slot="icon-only" name="search-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" class="wt-header-icon-btn" aria-label="Account" (click)="accountPopoverOpen = true">
        <ion-icon slot="icon-only" name="person-circle-outline"></ion-icon>
      </ion-button>
    </div>
  </div>

  <ion-popover
    class="wt-themed-popover"
    [isOpen]="accountPopoverOpen"
    (didDismiss)="accountPopoverOpen = false">
    <ng-template>
      <ion-content class="account-popover__content">
        <p class="account-popover__email" *ngIf="currentUser?.email">{{ currentUser!.email }}</p>
        <ion-button expand="block" fill="clear" class="account-popover__sign-out" (click)="confirmLogout()">
          <ion-icon slot="start" name="log-out-outline"></ion-icon>
          Sign out
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-popover>

  <div *ngIf="searchOpen" class="topbar__mobile-search">
    <ion-searchbar
      placeholder="Search…"
      [(ngModel)]="searchQuery"
      (keyup.enter)="onSearchSubmit()"
      [showCancelButton]="true"
      (ionCancel)="searchOpen = false">
    </ion-searchbar>
  </div>
</header>
