<div class="line-chart-host" #host>
  <svg
    class="line-chart-svg"
    [attr.width]="width"
    [attr.height]="height"
    [attr.viewBox]="'0 0 ' + width + ' ' + height"
    preserveAspectRatio="none"
    role="img"
    [attr.aria-label]="label || 'Line chart'">
    <defs>
      <linearGradient [attr.id]="gradientId" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" [attr.stop-color]="strokeColor" stop-opacity="0.3" />
        <stop offset="100%" [attr.stop-color]="strokeColor" stop-opacity="0" />
      </linearGradient>
    </defs>

    <g class="line-chart-grid">
      <line
        *ngFor="let g of gridLines"
        [attr.x1]="padding.left"
        [attr.y1]="g.y"
        [attr.x2]="width - padding.right"
        [attr.y2]="g.y"
        class="grid-line" />
      <text
        *ngFor="let g of gridLines"
        [attr.x]="padding.left - 6"
        [attr.y]="g.y + 4"
        class="axis-label axis-label--y"
        text-anchor="end">
        {{ g.label }}
      </text>
    </g>

    <path *ngIf="areaPath" [attr.d]="areaPath" [attr.fill]="'url(#' + gradientId + ')'" class="area-fill" />
    <path *ngIf="linePath" [attr.d]="linePath" class="line-stroke" [attr.stroke]="strokeColor" fill="none" />

    <circle
      *ngFor="let d of dots"
      [attr.cx]="d.x"
      [attr.cy]="d.y"
      r="3"
      class="data-dot"
      [attr.fill]="strokeColor" />

    <text
      *ngFor="let xl of xLabels"
      [attr.x]="xl.x"
      [attr.y]="height - 8"
      class="axis-label axis-label--x"
      text-anchor="middle">
      {{ xl.text }}
    </text>
  </svg>

  <div
    *ngIf="tooltipVisible"
    class="chart-tooltip"
    [style.left.px]="tooltipX"
    [style.top.px]="tooltipY">
    <span class="chart-tooltip__date">{{ tooltipDate }}</span>
    <span class="chart-tooltip__value">{{ tooltipValue }}</span>
  </div>
</div>
